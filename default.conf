server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # --- Security headers ---
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # If you never embed the site in iframes, DENY is fine.
  # If you ever need embeds, change to SAMEORIGIN or use CSP frame-ancestors.

  # Content Security Policy:
  # Start strict. If you add analytics/widgets later, you may need to loosen this.
  add_header Content-Security-Policy "
    default-src 'self';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    object-src 'none';
    script-src 'self';
    style-src 'self';
    img-src 'self' data:;
    font-src 'self';
    connect-src 'self';
    upgrade-insecure-requests;
  " always;

  # HSTS:
  # Only enable if the site is ALWAYS served over HTTPS (Cloudflare will be HTTPS).
  # Keep this enabled if your public hostname is HTTPS-only.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # Optional: reduce info leakage
  server_tokens off;

  # --- Compression (Cloudflare often does this at the edge, but origin gzip is still fine) ---
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/ttf
    font/otf
    application/vnd.ms-fontobject;

  # --- Caching policy ---
  # HTML: don't cache (so updates show up quickly)
  location = /index.html {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  # If you have a second page like /gear.html:
  location = /gear.html {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  # If you have other .html pages, apply the same rule:
  location ~* \.html$ {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  # Static assets: cache hard
  location ~* \.(?:css|js|mjs|map|jpg|jpeg|png|gif|webp|svg|ico|woff2|woff|ttf|otf|eot)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Optional: deny hidden files (.git, .env, etc.)
  location ~* /\.(?!well-known) {
    deny all;
  }

  # Default routing (no SPA behavior here; just serve files)
  location / {
    try_files $uri $uri/ =404;
  }
}